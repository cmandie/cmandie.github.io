<h1>Professional Growth Portfolio</h1>

<div class="section">
  <p>
    My professional journey has never been just about learning technical skills, it has been about becoming someone who can solve problems with integrity, 
    communicate with clarity, and build systems that respect the people who use them. Every project I’ve completed reflects not only what I know, but who I am becoming.
  </p>
</div>

<div class="section">
  <h2>Professional Competencies Aligned with My Spiritual Beliefs</h2>
  <p>
    Over time, I’ve realised that my strongest professional traits are deeply connected to my spiritual values. They aren’t separate worlds, they reinforce each other.
  </p>

  <div class="highlight-box">
    <ul>
      <li><strong>Integrity</strong> guides how I document systems, communicate decisions, and handle sensitive data.</li>
      <li><strong>Stewardship</strong> shapes how I design secure, resilient infrastructures that protect people’s information.</li>
      <li><strong>Compassion and fairness</strong> influence how I think about accessibility, user experience, and the impact of technology on diverse communities.</li>
      <li><strong>Diligence</strong> pushes me to refine my work, seek feedback, and keep improving even when the path is difficult.</li>
    </ul>
  </div>

  <p>
    These principles help me approach IT not just as a career, but as a calling — a way to serve, uplift, and protect.
  </p>
</div>

<div class="section">
  <h2>Heritage Vault 2.0  Secure Linux Infrastructure Project</h2>
  <p>
    Heritage Vault 2.0 is one of the most meaningful technical projects I’ve completed. It required designing a secure, scalable Linux infrastructure for storing 
    sacred genealogical data. I built out automation, centralized authentication, RAID + LVM storage, SELinux/AppArmor security, VLAN segmentation, VPN access, 
    and monitoring with Prometheus and Grafana.
  </p>

  <h3>Personal Story: The Night This Project Changed Me</h3>
  <div class="highlight-box">
    <p>
      There was one night during this project that I’ll never forget. I had been working a long shift, and by the time I sat down to continue the assignment, 
      I was mentally drained. A configuration kept breaking, and no matter what I tried, the system refused to cooperate.
    </p>
    <p>
      I remember staring at the screen, frustrated, tempted to close my laptop and call it a night. But something in me, the same resilience that carried me 
      through moving countries, starting over, and rebuilding my life told me to keep going.
    </p>
    <p>
      So I did. I researched more, tested again, rewrote parts of the configuration, and slowly the system began to respond. When it finally worked, I felt 
      something shift inside me.
    </p>
    <p>
      It wasn’t just the satisfaction of solving a technical problem. It was the realization that I don’t quit when things get hard. I persist. I adapt. I grow.
    </p>
    <p>
      That night taught me that my technical skills are shaped by my life experiences, by every challenge I’ve faced and every decision I’ve made to keep 
      moving forward. Heritage Vault 2.0 didn’t just strengthen my technical abilities; it strengthened my confidence in who I am becoming.
    </p>
  </div>
</div>

<div class="section">
  <h2>Ethical Dilemma Reflection</h2>
  <p>
    In Week 2, I faced an ethical dilemma involving unnecessary data collection. At first, it seemed like a simple technical choice, but the more I thought about it, 
    the more I realized how deeply it touched on principles I care about: honesty, fairness, and responsibility.
  </p>

  <p>
    Technology is never neutral. Every design choice affects real people. Collecting more data than necessary might make development easier, but it increases risk 
    for users especially those who trust us with sensitive information.
  </p>

  <h3>Personal Story: Why This Issue Hit Home</h3>
  <div class="highlight-box">
    <p>
      This dilemma felt personal because I’ve experienced what it’s like when my own data is mishandled. When I first moved to the UK, a service provider stored 
      my personal details insecurely. A small mistake on their part created weeks of stress for me, endless calls, paperwork, and the constant fear that my 
      identity could be misused.
    </p>
    <p>
      That experience stayed with me. It taught me how vulnerable people feel when their information is exposed. So when I faced this ethical dilemma in my 
      coursework, it wasn’t just theory and it reminded me of how it feels to be the user who hopes the developer made the right choice.
    </p>
  </div>

  <h3>My Ethical Principles</h3>
  <ul>
    <li><strong>Honesty</strong> — transparency about what data is collected and why</li>
    <li><strong>Fairness</strong> — ensuring no group is disadvantaged</li>
    <li><strong>Responsibility</strong> — protecting users even when it requires extra effort</li>
  </ul>

  <h3>Alternative Solution</h3>
  <p>I proposed a privacy‑by‑design approach:</p>

  <div class="highlight-box">
    <ul>
      <li>Collect only essential data</li>
      <li>Clearly explain how it will be used</li>
      <li>Provide meaningful consent options</li>
      <li>Encrypt and restrict access</li>
    </ul>
  </div>

  <p>
    This approach respects user agency, reduces harm, and builds long‑term trust. It also aligns with my spiritual belief that every person deserves dignity and protection.
  </p>
</div>

<div class="section">
  <h2>Refined Project: Ethical Integration and Complex Challenges</h2>
  <p>
    After reviewing my Heritage Vault 2.0 project, I identified several areas for refinement, especially around security, privacy, accessibility, and fairness.
  </p>

  <h3>Technical Refinements</h3>
  <ul>
    <li>Added LUKS encryption for archival volumes</li>
    <li>Implemented MFA for LDAP/AD</li>
    <li>Introduced ethical logging with minimum‑necessary data</li>
    <li>Added role‑based access to monitoring dashboards</li>
    <li>Improved accessibility for global users</li>
    <li>Strengthened compliance scanning using OpenSCAP</li>
  </ul>

  <h3>Impact of Refinements</h3>
  <p>
    These changes made the system more secure, more ethical, and more aligned with real‑world expectations for sensitive data systems. They also reflect the kind 
    of IT professional I want to be — someone who builds with integrity and thinks beyond the code.
  </p>
</div>

<div class="section">
  <h2>Peer Review Reflection</h2>
  <p>
    Peer feedback encouraged me to strengthen my ethical explanations and clarify how my refinements improved system resilience. I expanded my ethical integration 
    section and added more detail about my decision‑making process. This experience reminded me that collaboration is not just helpful — it’s essential for growth.
  </p>
</div>
