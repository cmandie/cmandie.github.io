<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clergy Mandizvidza – Portfolio</title>

    <!-- GLOBAL STYLES -->
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f7f9fc;
            color: #333;
        }

        /* HEADER */
        .topnav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #1e3a8a;
            padding: 12px 30px;
            color: white;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-section img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
        }

        .logo-text {
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }

        .search-icon {
            font-size: 20px;
            cursor: pointer;
        }

        /* DROPDOWN */
        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-btn {
            background: none;
            border: none;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            background-color: white;
            min-width: 180px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
            border-radius: 6px;
            z-index: 1000;
        }

        .dropdown-content a {
            color: #1e3a8a;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-weight: bold;
        }

        .dropdown-content a:hover {
            background-color: #e5e7eb;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        /* SEARCH BAR */
        #searchBar {
            display: none;
            width: 90%;
            margin: 15px auto;
            padding: 10px;
            border: 2px solid #1e3a8a;
            border-radius: 5px;
            font-size: 16px;
        }

        /* HERO BANNER — USING index.jpeg */
        .hero {
            background: url('index.jpg') center/cover no-repeat;
            color: white;
            padding: 80px 20px;
            text-align: center;
            position: relative;
        }

        .hero::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.45);
        }

        .hero h1, .hero h2, .hero p {
            position: relative;
            z-index: 2;
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .hero h2 {
            font-size: 24px;
            margin-bottom: 20px;
            font-weight: normal;
        }

        .hero p {
            font-size: 18px;
            max-width: 700px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* MAIN CONTENT */
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h2 {
            color: #1e3a8a;
        }

        hr {
            margin: 30px 0;
            border: 0;
            border-top: 2px solid #1e3a8a;
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 20px;
            background-color: #1e3a8a;
            color: white;
            margin-top: 40px;
        }
    </style>

    <!-- ICONS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
