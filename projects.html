<h1>My Projects: A Journey of Growth, Grit, and Purpose</h1>

<div class="section">
  <p>
    Every project I’ve completed in this program represents more than a technical requirement, it represents a moment in my journey where I chose to grow. 
    These projects reflect the skills I’ve gained, the challenges I’ve overcome, and the person I am becoming. They show my resilience, my curiosity, and my 
    commitment to building systems that serve people with integrity.
  </p>
</div>

<div class="section">
  <h2>Heritage Vault 2.0 Secure Linux Infrastructure Project</h2>
  <p>
    Heritage Vault 2.0 is one of the most meaningful and challenging projects I’ve worked on. The goal was to design a secure, scalable Linux infrastructure 
    capable of storing sacred genealogical data. I built out automation, centralized authentication, RAID + LVM storage, SELinux/AppArmor security, VLAN 
    segmentation, VPN access, and monitoring with Prometheus and Grafana.
  </p>

  <h3>Personal Story: The Night This Project Tested Me</h3>
  <div class="highlight-box">
    <p>
      There was a night during this project that I still think about. I had just finished a long shift, and by the time I sat down to work on the assignment, 
      I was exhausted. A configuration kept breaking, and no matter what I tried, the system refused to cooperate.
    </p>
    <p>
      I sat there staring at the screen, frustrated and tempted to give up for the night. But then I remembered why I started this journey, the sacrifices I 
      made to move countries, the challenges I’ve overcome, and the determination that brought me this far.
    </p>
    <p>
      So I took a deep breath, opened my notes, and tried again. And again. And again. Eventually, the system responded. The configuration worked. In that 
      moment, I realised that my resilience is one of my greatest technical skills.
    </p>
    <p>
      This project didn’t just teach me about Linux security, it taught me about myself. It reminded me that I don’t quit when things get hard. I adapt. 
      I persist. I grow.
    </p>
  </div>
</div>

<div class="section">
  <h2>Ethical Logging & Privacy‑First Design</h2>
  <p>
    This project focused on designing a logging system that protects user privacy while still providing meaningful operational insights. I implemented 
    minimum‑necessary data principles, removed personal identifiers, and added role‑based access controls.
  </p>
  <h3>What I Learned</h3>
  <p>
    This project helped me understand that ethical design isn’t an optional add‑on, it’s a responsibility. Technology should protect people, not expose them.
  </p>
</div>

<div class="section">
  <h2>Network Segmentation & Zero‑Trust Architecture</h2>
  <p>
    In this project, I designed a segmented network using VLANs, firewalls, and zero‑trust principles. The goal was to reduce attack surfaces and ensure that 
    every request is authenticated and authorized.
  </p>
  <h3>What I Learned</h3>
  <p>
    Security is not a single tool, it’s a mindset. It requires thinking ahead, anticipating risks, and designing systems that protect users even when things go wrong.
  </p>
</div>

<div class="section">
  <h2>Automation with Bash & Ansible</h2>
  <p>
    This project involved automating system configuration and deployment using Bash scripting and Ansible playbooks. I automated user creation, package 
    installation, service configuration, and security hardening.
  </p>
  <h3>What I Learned</h3>
  <p>
    Automation is about consistency, reliability, and reducing human error. It also taught me patience, debugging automation requires a different kind of persistence.
  </p>
</div>

<div class="section">
  <h2>Monitoring & Observability with Prometheus and Grafana</h2>
  <p>
    I built a monitoring stack that tracks system performance, logs, and alerts. This included dashboards, alert rules, and service health checks.
  </p>
  <h3>What I Learned</h3>
  <p>
    Monitoring is the heartbeat of any infrastructure. It’s how you see problems before users feel them.
  </p>
</div>

<div class="section">
  <h2>Why These Projects Matter to Me</h2>
  <p>
    Each project represents a moment where I chose growth over comfort. They show the evolution of my technical abilities, but more importantly, they show the 
    evolution of my character, my resilience, my integrity, and my desire to build systems that serve people with dignity.
  </p>
  <p>
    These projects are not just assignments. They are milestones in my journey.
  </p>
</div>
