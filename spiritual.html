<h1>Spiritual Progression: Agency, Stewardship, and Growth</h1>

<div class="section">
  <h2>Reflection on Agency</h2>
  <p>
    This week I reflected deeply on the principle of agency and how it shapes both my spiritual and professional development. Doctrine and Covenants 58:26–28 
    teaches that we are not meant to be acted upon but to act with intention, diligence, and faith. Every meaningful step I have taken academically, 
    professionally, and spiritually has come from choosing to engage, to learn, and to grow.
  </p>
</div>

<div class="section">
  <h2>Personal Story: How Agency Shaped My Journey</h2>
  <div class="highlight-box">
    <p>
      One of the most defining moments in my life happened long before I ever wrote a line of code. It was the day I decided to leave home and build a new life 
      in the UK. I didn’t have a perfect plan, and I didn’t know exactly how things would unfold. But I felt a quiet, steady impression that growth required 
      movement, that staying where I was would keep me safe, but not help me become who I needed to be.
    </p>
    <p>
      Those early months were hard. I was navigating a new culture, new responsibilities, and new expectations. There were days when I questioned whether I had 
      made the right choice. But every time I prayed or reflected, I felt the same message: <strong>Act. Move. Trust.</strong>
    </p>
    <p>
      Today, when I face challenges in my IT work or personal life, I draw strength from that season. It reminds me that God magnifies small steps, and that 
      progress often begins with a single, imperfect decision to try.
    </p>
  </div>
</div>

<div class="section">
  <h2>Stewardship Through Work</h2>
  <p>
    My spiritual progression is tied closely to my work. I see my technical abilities as a form of stewardship. The Lord has entrusted me with the capacity to 
    understand systems, data, infrastructure, and the ethical responsibilities that accompany them. When I design secure systems, communicate clearly, or solve 
    complex problems, I feel aligned with my spiritual values.
  </p>
</div>

<div class="section">
  <h2>Talks and Scriptures Guiding My Journey</h2>
  <div class="highlight-box">
    <ul>
      <li><em>Come What May, and Love It</em> — Elder Joseph B. Wirthlin</li>
      <li><em>Be Not Afraid, Only Believe</em> — Elder Jeffrey R. Holland</li>
      <li>Doctrine and Covenants 58:26–28 — Acting in faith and diligence</li>
    </ul>
  </div>
  <p>
    These teachings remind me that faith and effort work together. They guide how I approach challenges in both my personal life and my IT career.
  </p>
</div>

<div class="section">
  <h2>Spiritual Identity and Daily Work</h2>
  <p>
    My work becomes more than a task, it becomes a way to honour God, protect His children, and contribute to something meaningful. I want to build systems 
    that uplift, protect, and serve and not just function.
  </p>
</div>
